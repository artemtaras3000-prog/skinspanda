<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkinsPanda — Admin Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { background-color: #0b0f1a; color: white; font-family: sans-serif; }
        .page { display: none; }
        .page.active { display: block; }
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #10b981; padding: 12px 25px; border-radius: 12px; display: none; z-index: 1000; font-weight: bold; }
    </style>
</head>
<body>

    <div id="toast">✅ Успешно!</div>

    <div id="auth-gate" class="fixed inset-0 bg-[#0b0f1a] z-[999] flex flex-col items-center justify-center p-6">
        <div class="bg-slate-900 border border-slate-800 p-10 rounded-[40px] w-full max-w-sm text-center shadow-2xl">
            <span class="text-5xl block mb-4">🐼</span>
            <h2 class="text-2xl font-black mb-2 italic uppercase text-sky-400">SkinsPanda</h2>
            <p class="text-xs text-slate-400 uppercase font-bold tracking-wider mb-8">Панель Разработчика</p>
            <button onclick="loginAsArtem()" class="w-full bg-gradient-to-r from-amber-500 to-orange-600 text-black py-4 rounded-2xl font-black uppercase tracking-widest transition active:scale-95">
                Войти как Artem
            </button>
        </div>
    </div>

    <div id="app-content" style="display: none;">
        <header class="p-4 border-b border-slate-800 flex justify-between items-center bg-slate-900">
            <div class="flex items-center gap-3">
                <span class="text-3xl">🐼</span>
                <div class="text-xl font-black text-sky-400 italic uppercase">Skins<span>Panda Admin</span></div>
            </div>
            <div class="bg-amber-500/20 border border-amber-500/50 px-3 py-1.5 rounded-xl text-xs text-amber-500 font-black">
                🔑 РАЗРАБОТЧИК АКТИВЕН
            </div>
        </header>

        <main class="p-6 max-w-6xl mx-auto">
            <div class="bg-slate-900 border border-slate-800 rounded-[35px] p-6 shadow-2xl mb-10">
                <h3 class="text-lg font-black uppercase italic mb-6 text-amber-400">🔔 Заявки на пополнение баланса (<span id="req-count">0</span>)</h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="border-b border-slate-800 text-[10px] text-slate-500 font-black uppercase">
                                <th class="pb-3">Игрок</th>
                                <th class="pb-3">ID</th>
                                <th class="pb-3">Сумма</th>
                                <th class="pb-3 text-right">Действие</th>
                            </tr>
                        </thead>
                        <tbody id="admin-requests-table"></tbody>
                    </table>
                </div>
            </div>

            <div class="bg-slate-900 border border-slate-800 rounded-[35px] p-6 shadow-2xl">
                <h3 class="text-lg font-black uppercase italic mb-6 text-slate-300">👥 Все пользователи базы данных</h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="border-b border-slate-800 text-[10px] text-slate-500 font-black uppercase">
                                <th class="pb-3">Пользователь</th>
                                <th class="pb-3">ID игрока</th>
                                <th class="pb-3">Баланс</th>
                                <th class="pb-3 text-right">Управление</th>
                            </tr>
                        </thead>
                        <tbody id="admin-users-table"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAs8n6_k8R2hD_7YmlPqO03Xn8b-P9mRE4",
            authDomain: "skinspanda-global.firebaseapp.com",
            databaseURL: "https://skinspanda-global-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "skinspanda-global",
            storageBucket: "skinspanda-global.appspot.com"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let userDB = {};

        function loginAsArtem() {
            document.getElementById('auth-gate').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            
            // Загружаем заявки
            db.ref('requests').on('value', (snapshot) => {
                const data = snapshot.val() || {};
                const reqTable = document.getElementById('admin-requests-table');
                const reqCount = document.getElementById('req-count');
                const list = Object.keys(data).map(key => ({ requestId: key, ...data[key] }));
                
                reqCount.innerText = list.length;
                if(list.length === 0) {
                    reqTable.innerHTML = `<tr><td colspan="4" class="py-4 text-center text-slate-600 text-xs">Нет активных заявок</td></tr>`;
                } else {
                    reqTable.innerHTML = list.map(req => `
                    <tr class="border-b border-slate-800 text-xs">
                        <td class="py-3 font-bold">${req.name || 'Игрок'}</td>
                        <td class="py-3 font-mono text-slate-500">${req.uid}</td>
                        <td class="py-3 text-green-400 font-black">+ ${req.amount} ₽</td>
                        <td class="py-3 text-right">
                            <button onclick="acceptReq('${req.requestId}', '${req.uid}', ${req.amount})" class="bg-green-500 text-black px-3 py-1 rounded font-black text-[10px] uppercase">Принять</button>
                        </td>
                    </tr>`).join('');
                }
            });

            // Загружаем юзеров
            db.ref('users').on('value', (snapshot) => {
                userDB = snapshot.val() || {};
                const userTable = document.getElementById('admin-users-table');
                const keys = Object.keys(userDB);
                
                userTable.innerHTML = keys.map(uid => `
                <tr class="border-b border-slate-800 text-xs">
                    <td class="py-3 font-bold">${userDB[uid].name || 'Игрок'}</td>
                    <td class="py-3 font-mono text-slate-500">${uid}</td>
                    <td class="py-3 text-sky-400 font-black">${userDB[uid].balance || 0} ₽</td>
                    <td class="py-3 text-right">
                        <button onclick="addMoney('${uid}')" class="bg-slate-800 px-2 py-1 rounded text-[10px] font-black text-slate-300 uppercase">+ Баланс</button>
                    </td>
                </tr>`).join('');
            });
        }

        function acceptReq(reqId, uid, amount) {
            if(userDB[uid]) {
                const cur = userDB[uid].balance || 0;
                db.ref('users/' + uid + '/balance').set(cur + amount);
            }
            db.ref('requests/' + reqId).remove();
            showToast("Баланс выдан!");
        }

        function addMoney(uid) {
            const num = prompt("На сколько изменить баланс?");
            if(num && !isNaN(num)) {
                const cur = userDB[uid].balance || 0;
                db.ref('users/' + uid + '/balance').set(cur + parseInt(num));
                showToast("Баланс изменен!");
            }
        }

        function showToast(m) { const t = document.getElementById('toast'); t.innerText = "✅ " + m; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 3000); }
    </script>
</body>
</html>
